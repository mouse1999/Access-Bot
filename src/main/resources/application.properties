spring.application.name=Access-Bot

# ===============================
# DATABASE CONFIG (H2 FILE MODE)
# ===============================

spring.datasource.url=jdbc:h2:file:./data/accessbot-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# H2 CONSOLE
# ===============================

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# SERVER
# ===============================

server.port=8080


# Interval in minutes between each bet execution
bet.schedule.stagger-delay-mins=5


# ============================================
# Betting Site Configuration
# ============================================
bet.site.url=https://shop.accessbet.com/dashboard
bet.site.username=blissful1-cashier1
bet.site.password=

# ============================================
# Betslip Configuration
# ============================================
# Expected number of games in betslip before submission
bet.expected.games.count=3

# Default stake amount in NGN (?)
bet.stake.amount=30

# ============================================
# Playwright Browser Configuration
# ============================================
# Run browser in headless mode (true/false)
bet.playwright.headless=false

# Directory to store browser session data
bet.playwright.storage-dir=./sessions

# Context file name for session persistence
bet.playwright.context-file=bet-context.json

# Maximum number of navigation retries
bet.playwright.nav-max-retries=3